name: Update Market Snapshot

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/update-market.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/market-snapshot.json
          git diff --cached --quiet || git commit -m "chore: update market snapshot"

      - name: Push changes
        run: |
          git push